name: Release winice

# automatically trigger this workflow when a tag starting w/ a 'v' (eg. 'v1.0.2') is pushed
# but also allow to run the workflow manually 
# see: https://docs.github.com/en/actions/how-tos/manage-workflow-runs/manually-run-a-workflow) 
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # windows image w/ .NET 4.8
    # see: https://github.com/actions/runner-images/blob/win25/20260413.84/images/windows/Windows2025-Readme.md
    runs-on: windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build Release
        run: msbuild nice\nice.csproj /t:Clean,Build /p:Configuration=Release /p:Platform=AnyCPU

      - name: Prepare release asset
        shell: pwsh
        run: |
          Copy-Item nice\bin\Release\nice.exe nice.exe

      - name: Create GitHub release and upload nice.exe
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag `
            nice.exe `
            --title $tag `
            --notes "Automated release for $tag"
